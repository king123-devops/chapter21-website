server {
    listen 80;

    # Serve static React frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This handles React Router's dynamic routing
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for Django API endpoints
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy for Django Admin panel
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Reverse proxy for Django static files (admin panel styles)
    location /static/ {
        proxy_pass http://backend:8000/static/;
    }
    
    # Reverse proxy for Django media files (uploaded images)
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }
}
